site_name: 笔记库 | Academic Notes

theme:
  name: material
  language: zh
  features:
    - navigation.sections 
    - navigation.expand   
    - navigation.indexes  
    - navigation.top   
    - content.code.copy 
    # 注意：i18n.languages 主要是配合 i18n 插件使用的

# 开启数学公式
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - admonition

plugins:
  - search
  - i18n:
      default_language: zh
      languages:
        - locale: zh
          name: 中文
          default: true
        - locale: en
          name: English

# 课程目录映射
nav:
  - 首页: index.md
  - Mathematics (数学类):
      - 实分析 (M2): math/real_analysis.md
      - 计算共形几何 (M3): math/measure-theory.md
      - 凸优化 (T4): math/optimization.md
  - Computer Science (计算机类):
      - 计算复杂性 (T1): cs/complexity.md
      - 算法设计 (T2): cs/algorithms.md
      - 体系结构 (S1): cs/architecture.md
      - 操作系统内核 (S2): cs/os.md
      - 编译原理 (S3): cs/compilers.md
      - 分布式系统 (S5): cs/distributed.md
  - AI & Robotics (人工智能与机器人):
      - 信息论 (T3): robotics/information-theory.md
      - 深度学习理论 (L4): robotics/dl-theory.md
      - 理论强化学习 (L5): robotics/rl-theory.md
      - 图神经网络 (E2): cs/gnn.md
        - 节点嵌入 : cs/gnn/1.md 
  - Algorithm competition (算法竞赛):
      - 初级:
          - 前缀和: competition1/prefix_sum.md
          - 离散化: competition1/discretization.md
          - 分治法: competition1/divide.md
          - 贪心法和拟阵: competition1/greedy.md
